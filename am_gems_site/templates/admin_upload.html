{% extends 'base.html' %}
{% block content %}
<section class="section container">
    <p class="eyebrow">Inventory</p>
    <h1>Upload Product</h1>
    <p>Use this form to add gemstone bracelets, rings, and jewellery with image and price.</p>

    <form class="upload-form" method="post" enctype="multipart/form-data" action="{{ url_for('admin_upload') }}">
        <label for="name">Product Name</label>
        <input id="name" name="name" type="text" required />

        <label for="category">Category</label>
        <select id="category" name="category" required>
            {% for category in categories %}
            <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
        </select>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>

        <label for="price">Price (INR)</label>
        <input id="price" name="price" type="number" min="1" step="0.01" required />

        <label for="image">Product Image</label>
        <input id="image" name="image" type="file" accept=".png,.jpg,.jpeg,.webp" />

        <button class="btn btn-primary" type="submit">Upload Product</button>
    </form>
</section>
{% endblock %}
