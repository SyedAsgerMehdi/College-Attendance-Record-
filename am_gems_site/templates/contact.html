{% extends 'base.html' %}
{% block footer_panel %}{% endblock %}
{% block content %}
<section class="section container contact-grid">
    <div>
        <p class="eyebrow">Contact</p>
        <h1>Enquiry & Custom Orders</h1>
        <p>Share your gemstone preferences, occasion details, or customization requests. Our team will get back quickly.</p>
        <a class="btn btn-ghost" href="{{ whatsapp_link }}" target="_blank" rel="noopener">Chat on WhatsApp</a>
    </div>

    <form class="contact-form" method="post" action="{{ url_for('contact') }}">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button class="btn btn-primary" type="submit">Send Enquiry</button>
    </form>
</section>
{% endblock %}
